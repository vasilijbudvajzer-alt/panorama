<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дворцовая площадь начало ХХ века</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        #panorama-container {
            width: 100%;
            height: 60vh;
            background: #333;
        }

        #map-container {
            width: 100%;
            height: 40vh;
        }
        
        .pannellum-container {
            width: 100% !important;
            height: 100% !important;
        }

        @media (max-width: 768px) {
            #panorama-container, #map-container { height: 50vh; }
        }
    </style>
</head>
<body>

    <div id="panorama-container"></div>
    <div id="map-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=84244e44-246b-436a-ab06-6c6485221085&lang=ru_RU" type="text/javascript"></script>

    <script>
        const CONFIG = {
            imageUrl: 'итог.jpg',
            coords: [59.9396257, 30.31746454],
            northOffset: -60,
            horizonPitch: 5,
            markerTitle: 'Дворцовая площадь начало ХХ века',
            hfov: 100
        };

        let viewer = null;
        let panoramaPlacemark = null;
        let lastYaw = 0;

        // Генерация SVG иконки (бинокль + сектор)
        function createIconSvg(direction) {
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
                    <path d="M 32 32 L 32 8 A 24 24 0 0 1 52.78 20 Z" 
                          fill="rgba(128, 128, 128, 0.4)" 
                          stroke="rgba(128, 128, 128, 0.6)" 
                          stroke-width="1"
                          transform="rotate(${direction}, 32, 32)"/>
                    <g transform="rotate(${direction}, 32, 32)">
                        <circle cx="26" cy="32" r="9" fill="#2D8CFF" stroke="white" stroke-width="2"/>
                        <circle cx="26" cy="32" r="4" fill="white"/>
                        <circle cx="38" cy="32" r="9" fill="#2D8CFF" stroke="white" stroke-width="2"/>
                        <circle cx="38" cy="32" r="4" fill="white"/>
                        <rect x="26" y="30" width="12" height="4" fill="#2D8CFF"/>
                    </g>
                    <circle cx="32" cy="32" r="3" fill="#2D8CFF" stroke="white" stroke-width="1.5"/>
                </svg>
            `;
            return 'image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
        }

        // Обновление поворота метки при вращении панорамы
        function updateMarkerRotation() {
            if (!viewer || !panoramaPlacemark) return;
            
            const currentYaw = viewer.getYaw();
            
            if (Math.abs(currentYaw - lastYaw) > 2) {
                lastYaw = currentYaw;
                const totalRotation = currentYaw + CONFIG.northOffset;
                panoramaPlacemark.options.set('iconImageHref', createIconSvg(totalRotation));
            }
            
            setTimeout(updateMarkerRotation, 150);
        }

        // Инициализация карты
        ymaps.ready(function(){
            var myMap = new ymaps.Map("map-container", {
                center: CONFIG.coords,
                zoom: 17,
                controls: ['zoomControl', 'fullscreenControl']
            });

            panoramaPlacemark = new ymaps.Placemark(CONFIG.coords, {
                hintContent: CONFIG.markerTitle,
                balloonContentHeader: CONFIG.markerTitle,
                balloonContentBody: `Направление: ${CONFIG.northOffset}°<br>Угол обзора: ${CONFIG.hfov}°<br><small>Сектор поворачивается при просмотре</small>`
            }, {
                iconLayout: 'default#image',
                iconImageHref: createIconSvg(CONFIG.northOffset),
                iconImageSize: [64, 64],
                iconImageOffset: [-32, -32],
                iconShape: { type: 'Circle', coordinates: [0, 0], radius: 32 }
            });

            myMap.geoObjects.add(panoramaPlacemark);

            panoramaPlacemark.events.add('click', function() {
                if (!myMap.balloon.isOpen()) panoramaPlacemark.balloon.open();
            });

            myMap.behaviors.disable('scrollZoom');
            myMap.events.add('mouseenter', () => myMap.behaviors.enable('scrollZoom'));
            myMap.events.add('mouseleave', () => myMap.behaviors.disable('scrollZoom'));
        });

        // Инициализация панорамы
        viewer = pannellum.viewer('panorama-container', {
            "type": "equirectangular",
            "panorama": CONFIG.imageUrl,
            "autoLoad": true,
            "northOffset": CONFIG.northOffset,
            "horizonPitch": CONFIG.horizonPitch,
            "compass": true,
            "showZoomCtrl": true,
            "showFullscreenCtrl": true,
            "title": CONFIG.markerTitle,
            "yaw": 0,
            "pitch": 0,
            "hfov": CONFIG.hfov,
            "load": function() {
                setTimeout(updateMarkerRotation, 500);
            }
        });
    </script>
</body>
</html>
